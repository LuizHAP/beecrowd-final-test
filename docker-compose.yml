version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: beecrowd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beecrowd
      POSTGRES_PASSWORD: beecrowd123
      POSTGRES_DB: beecrowd_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
